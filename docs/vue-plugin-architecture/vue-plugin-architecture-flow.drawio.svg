itch></g><path d="M 370 190 L 370 213.63" fill="none" stroke="rgb(0, 0, 0)" stroke-miterlimit="10" pointer-events="stroke"/><path d="M 370 218.88 L 366.5 211.88 L 370 213.63 L 373.5 211.88 Z" fill="rgb(0, 0, 0)" stroke="rgb(0, 0, 0)" stroke-miterlimit="10" pointer-events="all"/><rect x="0" y="220" width="740" height="85" rx="12.75" ry="12.75" fill="#ffe6cc" stroke="#d79b00" pointer-events="all"/><g transform="translate(-0.5 -0.5)"><switch><foreignObject pointer-events="none" width="100%" height="100%" requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility" style="overflow: visible; text-align: left;"><div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: unsafe center; justify-content: unsafe flex-start; width: 726px; height: 1px; padding-top: 263px; margin-left: 14px;"><div data-drawio-colors="color: rgb(0, 0, 0); " style="box-sizing: border-box; font-size: 0px; text-align: left;"><div style="display: inline-block; font-size: 12px; font-family: Helvetica; color: rgb(0, 0, 0); line-height: 1.2; pointer-events: all; white-space: normal; overflow-wrap: normal;"><b>2. Bundle</b><br /><font size="1">The bundler follows imports from that </font><font size="1" face="Courier New">index.ts</font><font size="1"> (implementation classes, etc.). Other </font><font size="1" face="Courier New">BUILD_TARGET</font><font size="1"> folders are <b>not</b> in the graph — smaller, target-specific output.</font></div></div></div></foreignObject><text x="14" y="266" fill="rgb(0, 0, 0)" font-family="Helvetica" font-size="12px">2. Bundle...</text></switch></g><path d="M 370 305 L 370 343.63" fill="none" stroke="#999999" stroke-miterlimit="10" stroke-dasharray="3 3" pointer-events="stroke"/><path d="M 370 348.88 L 366.5 341.88 L 370 343.63 L 373.5 341.88 Z" fill="#999999" stroke="#999999" stroke-miterlimit="10" pointer-events="all"/><rect x="200" y="318" width="340" height="22" fill="none" stroke="none" pointer-events="all"/><g transform="translate(-0.5 -0.