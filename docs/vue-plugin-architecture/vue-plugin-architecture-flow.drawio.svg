"1" face="Courier New">plugin-registry.ts</font><font size="1"> imports </font><font size="1" face="Courier New">"virtual:media-player"</font><font size="1"> (already resolved to web bundle) and calls </font><font size="1" face="Courier New">installMediaPlayer(app)</font><font size="1">.</font></div></div></div></foreignObject><text x="14" y="404" fill="rgb(0, 0, 0)" font-family="Helvetica" font-size="12px">3. Bootstrap (runtime)...</text></switch></g><path d="M 370 450 L 370 473.63" fill="none" stroke="rgb(0, 0, 0)" stroke-miterlimit="10" pointer-events="stroke"/><path d="M 370 478.88 L 366.5 471.88 L 370 473.63 L 373.5 471.88 Z" fill="rgb(0, 0, 0)" stroke="rgb(0, 0, 0)" stroke-miterlimit="10" pointer-events="all"/><rect x="0" y="480" width="740" height="95" rx="14.25" ry="14.25" fill="#d5e8d4" stroke="#82b366" pointer-events="all"/><g transform="translate(-0.5 -0.5)"><switch><foreignObject pointer-events="none" width="100%" height="100%" requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility" style="overflow: visible; text-align: left;"><div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: unsafe center; justify-content: unsafe flex-start; width: 726px; height: 1px; padding-top: 528px; margin-left: 14px;"><div data-drawio-colors="color: rgb(0, 0, 0); " style="box-sizing: border-box; font-size: 0px; text-align: left;"><div style="display: inline-block; font-size: 12px; font-family: Helvetica; color: rgb(0, 0, 0); line-height: 1.2; pointer-events: all; white-space: normal; overflow-wrap: normal;"><b>4. Register on the app</b><br /><font size="1" face="Courier New">installMediaPlayer</font><font size="1"> runs </font><font size="1" face="Courier New">app.provide(MediaPlayerKey, new WebMediaPlayerService(…))</font><br /><font size="1">The key comes from the same plugin package; the instance implements </font><font size="1" face="Courier New">MediaPlayerService</font><font size="1"> (</font><font size="1" face="Courier New">contract.ts</font><font size="1">).</font></div></div></div></foreignObject><text x="14" y="531" fill="rgb(0, 0, 0)" font-family="Helvetica" font-size="12px">4. Register on the app...</text></switch></g><path d="M 370 575 L 370 598.63" fill="none" stroke="rgb(0, 0, 0)" stroke-miterlimit="10" pointer-events="stroke"/><path d="M 370 603.88 L 366.5 596.88 L 370 598.63 L 373.5 596.88 Z" fill="rgb(0, 0, 0)" stroke="rgb(0, 0, 0)" stroke-miterlimit="10" pointer-events="all"/><rect x="0" y="605" width="740" height="100" rx="15" ry="15" fill="#dae8fc" stroke="#6c8ebf" pointer-events="all"/><g transform="translate(-0.5 -0.5)"><switch><foreignObject pointer-events="none" width="100%" height="100%" requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility" style="overflow: visible; text-align: left;"><div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: unsafe center; justify-content: unsafe flex-start; width: 726px; height: 1px; padding-top: 655px; margin-left: 14px;"><div data-drawio-colors="color: rgb(0, 0, 0); " style="box-sizing: border-box; font-size: 0px; text-align: left;"><div style="display: inline-block; font-size: 12px; font-family: Helvetica; color: rgb(0, 0, 0); line-height: 1.2; pointer-events: all; white-space: normal; overflow-wrap: normal;"><b>5. Consume in UI</b><br /><font size="1">Components import the injection key from </font><font size="1" face="Courier New">plugins/media-player/token.ts</font><font size="1"> (not from </font><font size="1" face="Courier New">virtual:…</font><font size="1">) and call </font><font size="1" face="Courier New">inject(MediaPlayerKey)</font><font size="1">. They only use the <b>contract</b> type — no direct imports of </font><font size="1" face="Courier New">web/</font><font size="1"> implementation files.</font></div></div></div></foreignObject><text x="14" y="659" fill="rgb(0, 0, 0)" font-family="Helvetica" font-size="12px">5. Consume in UI...</text></switch></g><path d="M 370 705 L 370 728.63" fill="none" stroke="rgb(0, 0, 0)" stroke-miterlimit="10" pointer-events="stroke"/><path d="M 370 733.88 L 366.5 726.88 L 370 728.63 L 373.5 726.88 Z" fill="rgb(0, 0, 0)" stroke="rgb(0, 0, 0)" stroke-miterlimit="10" pointer-events="all"/><rect x="0" y="735" width="740" height="95" rx="14.25" ry="14.25" fill="#f5f5f5" stroke="#666666" pointer-events="all"/><g transform="translate(-0.5 -0.5)"><switch><foreignObject pointer-events="none" width="100%" height="100%" requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility" style="overflow: visible; text-align: left;"><div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: unsafe center; justify-content: unsafe flex-start; width: 726px; height: 1px; padding-top: 783px; margin-left: 14px;"><div data-drawio-colors="color: rgb(0, 0, 0); " style="box-sizing: border-box; font-size: 0px; text-align: left;"><div style="display: inline-block; font-size: 12px; font-family: Helvetica; color: rgb(0, 0, 0); line-height: 1.2; pointer-events: all; white-space: normal; overflow-wrap: normal;"><b>Another plugin?</b><br /><font size="1">Repeat <b>1–2</b> for each new </font><font size="1" face="Courier New">virtual:…</font><font size="1"> id, add <b>3–4</b> in </font><font size="1" face="Courier New">plugin-registry</font><font size="1">, <b>5</b> with that plugin’s </font><font size="1" face="Courier New">token.ts</font><font size="1">. See architecture README + </font><font size="1" face="Courier New">vue-plugin-architecture.drawio</font><font size="1"> checklist.</font></div></div></div></foreignObject><text x="14" y="786" fill="rgb(0, 0, 0)" font-family="Helvetica" font-size="12px">Another plugin?...</text></switch></g><rect x="0" y="860" width="620" height="45" fill="none" stroke="none" pointer-events="all"/><g transform="translate(-0.5 -0.5)"><switch><foreignObject pointer-events="none" width="100%" height="100%" requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility" style="overflow: visible; text-align: left;"><div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: unsafe flex-start; justify-content: unsafe flex-start; width: 1px; height: 1px; padding-top: 867px; margin-left: 2px;"><div data-drawio-colors="color: rgb(0, 0, 0); " style="box-sizing: border-box; font-size: 0px; text-align: left;"><div style="display: inline-block; font-size: 11px; font-family: Helvetica; color: rgb(0, 0, 0); line-height: 1.2; pointer-events: all; white-space: nowrap;"><b>Legend</b><br />Dashed arrow: transition from build-time resolution to runtime execution. Solid arrows: order of steps.</div></div></div></foreignObject><text x="2" y="878" fill="rgb(0, 0, 0)" font-family="Helvetica" font-size="11px">Legend...</text></switch></g></g><switch><g requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility"/><a transform="translate(0,-5)" xlink:href="https://www.diagrams.net/doc/faq/svg-export-text-problems" target="_blank"><text text-anchor="middle" font-size="10px" x="50%" y="100%">Text is not SVG - cannot display</text></a></switch></svg>