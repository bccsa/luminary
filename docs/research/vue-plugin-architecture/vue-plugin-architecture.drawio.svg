<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#333"/>
    </marker>
    <style type="text/css"><![CDATA[
      .title { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #111; }
      .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #444; }
      .boxtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 600; fill: #111; }
      .boxtext { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #222; }
      .step { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 700; fill: #fff; }
      .legend { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #333; }
    ]]></style>
  </defs>

  <rect width="1000" height="720" fill="#fafafa"/>

  <text x="500" y="36" text-anchor="middle" class="title">Luminary: Vue platform plugin architecture</text>
  <text x="500" y="56" text-anchor="middle" class="subtitle">Web default + optional Capacitor bundle / luminary-plugins · Single composition plugin (Option A)</text>

  <!-- Main runtime flow -->
  <text x="40" y="88" class="boxtitle">Runtime flow (every build)</text>

  <g id="flow-column">
    <!-- Step boxes -->
    <rect x="40" y="98" width="130" height="56" rx="6" fill="#dae8fc" stroke="#6c8ebf"/>
    <text x="105" y="121" text-anchor="middle" class="boxtitle">1. Bootstrap</text>
    <text x="105" y="136" text-anchor="middle" class="boxtext">main.ts</text>
    <text x="105" y="148" text-anchor="middle" class="boxtext">app.use(plugin)</text>

    <path d="M170 126 H200" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

    <rect x="200" y="98" width="140" height="56" rx="6" fill="#d5e8d4" stroke="#82b366"/>
    <text x="270" y="121" text-anchor="middle" class="boxtitle">2. Plugin</text>
    <text x="270" y="136" text-anchor="middle" class="boxtext">platformServices</text>
    <text x="270" y="148" text-anchor="middle" class="boxtext">Plugin.install()</text>

    <path d="M340 126 H370" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

    <rect x="370" y="98" width="150" height="56" rx="6" fill="#fff2cc" stroke="#d6b656"/>
    <text x="445" y="121" text-anchor="middle" class="boxtitle">3. Context</text>
    <text x="445" y="136" text-anchor="middle" class="boxtext">getRuntimeInfo()</text>
    <text x="445" y="148" text-anchor="middle" class="boxtext">optional for installers</text>

    <path d="M520 126 H550" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

    <rect x="550" y="98" width="160" height="56" rx="6" fill="#f8cecc" stroke="#b85450"/>
    <text x="630" y="121" text-anchor="middle" class="boxtitle">4. Installer</text>
    <text x="630" y="136" text-anchor="middle" class="boxtext">installMediaServices</text>
    <text x="630" y="148" text-anchor="middle" class="boxtext">+ future installers</text>

    <path d="M710 126 H740" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

    <rect x="740" y="98" width="200" height="56" rx="6" fill="#e1d5e7" stroke="#9673a6"/>
    <text x="840" y="118" text-anchor="middle" class="boxtitle">5. Factory</text>
    <text x="840" y="132" text-anchor="middle" class="boxtext">createMediaPlayerService()</text>
    <text x="840" y="146" text-anchor="middle" class="boxtext">@/platform/adapters/media-player</text>

    <!-- vertical to provide -->
    <path d="M840 154 L840 188" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

    <rect x="730" y="192" width="220" height="48" rx="6" fill="#d5e8d4" stroke="#82b366"/>
    <text x="840" y="214" text-anchor="middle" class="boxtitle">6. Register</text>
    <text x="840" y="230" text-anchor="middle" class="boxtext">app.provide(MediaPlayerKey, service)</text>

    <path d="M730 216 H260 V280" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

    <rect x="40" y="262" width="440" height="72" rx="8" fill="#dae8fc" stroke="#6c8ebf"/>
    <text x="260" y="288" text-anchor="middle" class="boxtitle">7. Feature modules (platform-agnostic)</text>
    <text x="260" y="306" text-anchor="middle" class="boxtext">inject(MediaPlayerKey) — same contract on web and Capacitor</text>
    <text x="260" y="322" text-anchor="middle" class="boxtext">No Capacitor imports here · luminary has no @capacitor/core dependency</text>
  </g>

  <!-- Build-time / deployment lane -->
  <text x="520" y="288" class="boxtitle">Parallel: Capacitor bundle (optional)</text>

  <rect x="520" y="298" width="420" height="92" rx="8" fill="#fff2cc" stroke="#d6b656"/>
  <text x="730" y="322" text-anchor="middle" class="boxtitle">Vite alias (example: VITE_MEDIA_PLAYER_ADAPTER_PATH)</text>
  <text x="730" y="340" text-anchor="middle" class="boxtext">Redirects @/platform/adapters/media-player → luminary-deployment factory</text>
  <text x="730" y="356" text-anchor="middle" class="boxtext">Same source import path; different bundled implementation</text>
  <text x="730" y="376" text-anchor="middle" class="boxtext">Alternative: pass factories via app.use(plugin, options) from deployment</text>

  <path d="M840 250 L900 250 V298" stroke="#d6b656" stroke-width="1.5" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow)"/>

  <rect x="520" y="405" width="420" height="56" rx="6" fill="#ffe6cc" stroke="#d79b00"/>
  <text x="730" y="428" text-anchor="middle" class="boxtitle">luminary-deployment / luminary-plugins</text>
  <text x="730" y="446" text-anchor="middle" class="boxtext">Capacitor adapters, auth, updater, deep links, native-only code</text>

  <!-- Adding a new service -->
  <text x="40" y="378" class="boxtitle">Adding a new platform service (checklist)</text>

  <rect x="40" y="390" width="460" height="120" rx="8" fill="#ffffff" stroke="#999"/>
  <text x="60" y="412" class="boxtext">1. contracts/&lt;feature&gt;.ts</text>
  <text x="60" y="428" class="boxtext">2. tokens.ts — new InjectionKey</text>
  <text x="60" y="444" class="boxtext">3. adapters/web/ — default implementation</text>
  <text x="60" y="460" class="boxtext">4. adapters/&lt;feature&gt;/index.ts — create…Service() factory</text>
  <text x="60" y="476" class="boxtext">5. installers/ — install…Services(app, runtime) + call from platformServicesPlugin</text>
  <text x="60" y="492" class="boxtext">6. (Capacitor) luminary-plugins + alias or plugin options</text>

  <!-- Legend -->
  <rect x="40" y="530" width="900" height="160" rx="8" fill="#f0f0f0" stroke="#bbb"/>
  <text x="60" y="556" class="boxtitle">Legend</text>
  <rect x="60" y="568" width="14" height="14" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="82" y="580" class="legend">App / consumer</text>
  <rect x="220" y="568" width="14" height="14" fill="#d5e8d4" stroke="#82b366"/>
  <text x="242" y="580" class="legend">Plugin &amp; provide</text>
  <rect x="420" y="568" width="14" height="14" fill="#fff2cc" stroke="#d6b656"/>
  <text x="442" y="580" class="legend">Context / build-time config</text>
  <rect x="620" y="568" width="14" height="14" fill="#f8cecc" stroke="#b85450"/>
  <text x="642" y="580" class="legend">Feature installer</text>
  <rect x="820" y="568" width="14" height="14" fill="#e1d5e7" stroke="#9673a6"/>
  <text x="842" y="580" class="legend">Factory / adapter module</text>

  <text x="60" y="606" class="legend">Solid arrows: control flow at runtime. Dashed: optional build-time wiring from deployment.</text>
  <text x="60" y="628" class="legend">Editable source: this file is plain SVG (not diagrams.net XML). Import into draw.io if you need the graphical editor.</text>
  <text x="60" y="648" class="legend">Full narrative + implementation steps: README.md in this folder.</text>
  <text x="60" y="668" class="legend">Selected architecture: Option A — single platformServicesPlugin with internal feature installers.</text>
</svg>
