server {
    listen       80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # This endpoint is polled by the in-app update banner. It must never be served
    # from an intermediary cache after a deployment.
    location = /version.json {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store";
    }

    # Enable gzip compression (set via docker environment variable)
    __GZIP_DIRECTIVE__ 

    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml

    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_vary on;
    gzip_proxied any;
    gzip_disable "msie6";
    gzip_static on;
}
