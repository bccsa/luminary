name: E2E Tests (Deployed Dev)

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    issues: write

env:
    CI: true

jobs:
    e2e:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        defaults:
            run:
                working-directory: playwright-tests
        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version-file: playwright-tests/.node-version
                  cache: npm
                  cache-dependency-path: playwright-tests/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium

            - name: Run Playwright tests
              env:
                  APP_BASE_URL: ${{ vars.APP_BASE_URL }}
                  CMS_BASE_URL: ${{ vars.CMS_BASE_URL }}
                  E2E_AUTH_PROVIDER_LABEL: ${{ vars.E2E_AUTH_PROVIDER_LABEL }}
                  E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
                  E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
                  E2E_USER_2_EMAIL: ${{ secrets.E2E_USER_2_EMAIL }}
                  E2E_USER_2_PASSWORD: ${{ secrets.E2E_USER_2_PASSWORD }}
              run: npx playwright test

            - name: Upload Playwright report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-tests/playwright-report
                  retention-days: 14

            - name: Upload test results (traces/videos/screenshots)
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-test-results
                  path: playwright-tests/test-results
                  retention-days: 14

            - name: Create or update failure issue
              if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: actions/github-script@v7
              with:
                  script: |
                      const sha = context.sha.substring(0, 7);
                      const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
                      const titlePrefix = 'E2E tests failing on main';
                      const body = [
                          `E2E tests failed on \`main\` at commit \`${sha}\`.`,
                          '',
                          `**Workflow run:** ${runUrl}`,
                          `**Commit:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`,
                          '',
                          'Download the `playwright-report` and `playwright-test-results` artifacts from the run for traces, screenshots, and videos.',
                      ].join('\n');

                      const existing = await github.rest.issues.listForRepo({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          state: 'open',
                          labels: 'e2e-failure',
                          per_page: 100,
                      });

                      const match = existing.data.find((i) => i.title.startsWith(titlePrefix));

                      if (match) {
                          await github.rest.issues.createComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: match.number,
                              body: `New failure on \`main\` @ \`${sha}\`.\n\n${body}`,
                          });
                      } else {
                          await github.rest.issues.create({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              title: `${titlePrefix} @ ${sha}`,
                              body,
                              labels: ['e2e-failure', 'bug'],
                          });
                      }
